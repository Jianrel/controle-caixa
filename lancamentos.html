<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lançamentos - Controle de Caixa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div id="navbar"></div>
    <div id="sidebar"></div>

    <main class="main-content">
        <div class="container-fluid py-3">
            <div id="alert-container"></div>

            <div class="page-header">
                <h1><i class="bi bi-currency-dollar me-2"></i>Lançamentos</h1>
                <button class="btn btn-primary" onclick="abrirModalLancamento()">
                    <i class="bi bi-plus-lg me-1"></i>Novo Lançamento
                </button>
            </div>

            <div class="filter-bar">
                <form id="form-filtros" class="row g-2 align-items-end">
                    <div class="col-md-2">
                        <label class="form-label small text-muted">Tipo</label>
                        <select id="filtro-tipo" class="form-select form-select-sm">
                            <option value="">Todos</option>
                            <option value="entrada">Entrada</option>
                            <option value="saida">Saída</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small text-muted">Categoria</label>
                        <select id="filtro-categoria" class="form-select form-select-sm">
                            <option value="">Todas</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small text-muted">Forma Pgto</label>
                        <select id="filtro-forma" class="form-select form-select-sm">
                            <option value="">Todas</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small text-muted">Data Início</label>
                        <input type="date" id="filtro-data-inicio" class="form-control form-control-sm">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small text-muted">Data Fim</label>
                        <input type="date" id="filtro-data-fim" class="form-control form-control-sm">
                    </div>
                    <div class="col-md-2 d-flex gap-2">
                        <button type="submit" class="btn btn-primary btn-sm flex-grow-1"><i class="bi bi-funnel me-1"></i>Filtrar</button>
                        <button type="button" class="btn btn-outline-secondary btn-sm" onclick="limparFiltros()">Limpar</button>
                    </div>
                </form>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead>
                                <tr>
                                    <th>Data</th><th>Tipo</th><th>Categoria</th><th>Descrição</th>
                                    <th>Paciente</th><th>Forma Pgto</th><th class="text-end">Valor</th><th class="text-end">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="tabela-lancamentos">
                                <tr><td colspan="8" class="text-center text-muted py-4">Carregando...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <nav class="mt-3" id="paginacao"></nav>
        </div>
    </main>

    <!-- Modal -->
    <div class="modal fade" id="modalLancamento" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modal-titulo">Novo Lançamento</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="lanc-id">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Tipo</label>
                            <select class="form-select" id="lanc-tipo">
                                <option value="entrada">Entrada</option>
                                <option value="saida">Saída</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Valor (R$)</label>
                            <input type="text" class="form-control" id="lanc-valor" placeholder="0,00" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Data</label>
                            <input type="date" class="form-control" id="lanc-data" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Forma de Pagamento</label>
                            <select class="form-select" id="lanc-forma"></select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Categoria</label>
                            <select class="form-select" id="lanc-categoria"></select>
                        </div>
                        <div class="col-md-6" id="grupo-paciente">
                            <label class="form-label">Paciente (opcional)</label>
                            <select class="form-select" id="lanc-paciente"></select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Descrição</label>
                            <input type="text" class="form-control" id="lanc-descricao" placeholder="Breve descrição">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Observações</label>
                            <textarea class="form-control" id="lanc-observacoes" rows="2"></textarea>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="salvarLancamento()">
                        <i class="bi bi-check-lg me-1"></i>Salvar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/lancamentos.js"></script>
</body>
</html>
