<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paciente - Controle de Caixa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div id="navbar"></div>
    <div id="sidebar"></div>

    <main class="main-content">
        <div class="container-fluid py-3">
            <div id="alert-container"></div>

            <div class="page-header">
                <h1><i class="bi bi-person me-2"></i><span id="pac-nome">Paciente</span></h1>
                <div class="d-flex gap-2">
                    <a href="#" class="btn btn-outline-primary" id="btn-editar"><i class="bi bi-pencil me-1"></i>Editar</a>
                    <a href="pacientes.html" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Voltar</a>
                </div>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-lg-4">
                    <div class="form-section">
                        <h5 class="mb-3">Dados do Paciente</h5>
                        <p><strong>CPF:</strong> <span id="pac-cpf"></span></p>
                        <p><strong>Telefone:</strong> <span id="pac-telefone"></span></p>
                        <p><strong>Email:</strong> <span id="pac-email"></span></p>
                        <div id="pac-obs-row"><p><strong>Observações:</strong> <span id="pac-obs"></span></p></div>
                        <p class="text-muted small">Cadastrado em <span id="pac-criado"></span></p>
                    </div>
                </div>
                <div class="col-lg-8">
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white border-0 pt-3">
                            <h5 class="card-title mb-0">Histórico de Pagamentos</h5>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead>
                                        <tr><th>Data</th><th>Categoria</th><th>Descrição</th><th>Forma Pgto</th><th class="text-end">Valor</th></tr>
                                    </thead>
                                    <tbody id="tabela-lancamentos">
                                        <tr><td colspan="5" class="text-center text-muted py-4">Carregando...</td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/paciente-detalhe.js"></script>
</body>
</html>
