<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Controle de Caixa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div id="navbar"></div>
    <div id="sidebar"></div>

    <main class="main-content">
        <div class="container-fluid py-3">
            <div id="alert-container"></div>

            <div class="page-header">
                <h1><i class="bi bi-speedometer2 me-2"></i>Dashboard</h1>
                <span class="text-muted" id="mes-atual"></span>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-sm-6 col-xl-3">
                    <div class="card card-stat">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="stat-icon bg-success bg-opacity-10 text-success"><i class="bi bi-arrow-up-circle"></i></div>
                            <div><p class="stat-label">Entradas</p><p class="stat-value text-success" id="total-entradas">R$ 0,00</p></div>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6 col-xl-3">
                    <div class="card card-stat">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="stat-icon bg-danger bg-opacity-10 text-danger"><i class="bi bi-arrow-down-circle"></i></div>
                            <div><p class="stat-label">Saídas</p><p class="stat-value text-danger" id="total-saidas">R$ 0,00</p></div>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6 col-xl-3">
                    <div class="card card-stat">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="stat-icon bg-primary bg-opacity-10 text-primary"><i class="bi bi-wallet2"></i></div>
                            <div><p class="stat-label">Saldo</p><p class="stat-value text-success" id="saldo">R$ 0,00</p></div>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6 col-xl-3">
                    <div class="card card-stat">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="stat-icon bg-info bg-opacity-10 text-info"><i class="bi bi-receipt"></i></div>
                            <div><p class="stat-label">Lançamentos</p><p class="stat-value" id="total-lancamentos">0</p></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-3">
                <div class="col-lg-8">
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white border-0 pt-3"><h5 class="card-title mb-0">Entradas vs Saídas (Mês Atual)</h5></div>
                        <div class="card-body"><canvas id="graficoDiario" height="300"></canvas></div>
                    </div>
                </div>
                <div class="col-lg-4">
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white border-0 pt-3 d-flex justify-content-between align-items-center">
                            <h5 class="card-title mb-0">Últimos Lançamentos</h5>
                            <a href="lancamentos.html" class="btn btn-sm btn-outline-primary">Ver todos</a>
                        </div>
                        <div class="card-body p-0">
                            <div class="list-group list-group-flush" id="ultimos-lancamentos">
                                <div class="list-group-item text-center text-muted py-4">Carregando...</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
