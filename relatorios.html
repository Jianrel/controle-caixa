<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatórios - Controle de Caixa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div id="navbar"></div>
    <div id="sidebar"></div>

    <main class="main-content">
        <div class="container-fluid py-3">
            <div id="alert-container"></div>

            <div class="page-header">
                <h1><i class="bi bi-bar-chart me-2"></i>Relatórios</h1>
                <button class="btn btn-outline-success" id="btn-exportar">
                    <i class="bi bi-download me-1"></i>Exportar CSV
                </button>
            </div>

            <div class="filter-bar mb-4">
                <form id="form-periodo" class="row g-2 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label small text-muted">Mês</label>
                        <select id="sel-mes" class="form-select form-select-sm">
                            <option value="1">Janeiro</option><option value="2">Fevereiro</option>
                            <option value="3">Março</option><option value="4">Abril</option>
                            <option value="5">Maio</option><option value="6">Junho</option>
                            <option value="7">Julho</option><option value="8">Agosto</option>
                            <option value="9">Setembro</option><option value="10">Outubro</option>
                            <option value="11">Novembro</option><option value="12">Dezembro</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small text-muted">Ano</label>
                        <input type="number" id="sel-ano" class="form-control form-control-sm" min="2020" max="2030">
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary btn-sm"><i class="bi bi-search me-1"></i>Consultar</button>
                    </div>
                </form>
            </div>

            <!-- Cards resumo -->
            <div class="row g-3 mb-4">
                <div class="col-sm-6 col-lg-3">
                    <div class="card card-stat"><div class="card-body text-center">
                        <p class="stat-label">Total Entradas</p><p class="stat-value text-success" id="r-entradas">R$ 0,00</p>
                    </div></div>
                </div>
                <div class="col-sm-6 col-lg-3">
                    <div class="card card-stat"><div class="card-body text-center">
                        <p class="stat-label">Total Saídas</p><p class="stat-value text-danger" id="r-saidas">R$ 0,00</p>
                    </div></div>
                </div>
                <div class="col-sm-6 col-lg-3">
                    <div class="card card-stat"><div class="card-body text-center">
                        <p class="stat-label">Saldo</p><p class="stat-value text-success" id="r-saldo">R$ 0,00</p>
                    </div></div>
                </div>
                <div class="col-sm-6 col-lg-3">
                    <div class="card card-stat"><div class="card-body text-center">
                        <p class="stat-label">Lançamentos</p><p class="stat-value" id="r-total">0</p>
                    </div></div>
                </div>
            </div>

            <!-- Gráfico mensal + formas de pagamento -->
            <div class="row g-3 mb-4">
                <div class="col-lg-8">
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white border-0 pt-3"><h5 class="card-title mb-0">Entradas vs Saídas por Dia</h5></div>
                        <div class="card-body"><canvas id="grafico-mensal" height="300"></canvas></div>
                    </div>
                </div>
                <div class="col-lg-4">
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white border-0 pt-3"><h5 class="card-title mb-0">Por Forma de Pagamento</h5></div>
                        <div class="card-body p-0">
                            <div class="list-group list-group-flush" id="lista-formas">
                                <div class="list-group-item text-center text-muted py-3">Sem dados</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Por categoria -->
            <div class="row g-3">
                <div class="col-md-6">
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white border-0 pt-3">
                            <h5 class="card-title mb-0 text-success"><i class="bi bi-arrow-up-circle me-1"></i>Entradas por Categoria</h5>
                        </div>
                        <div class="card-body">
                            <canvas id="grafico-entradas" height="250"></canvas>
                            <div id="lista-entradas" class="mt-3"></div>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white border-0 pt-3">
                            <h5 class="card-title mb-0 text-danger"><i class="bi bi-arrow-down-circle me-1"></i>Saídas por Categoria</h5>
                        </div>
                        <div class="card-body">
                            <canvas id="grafico-saidas" height="250"></canvas>
                            <div id="lista-saidas" class="mt-3"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/relatorios.js"></script>
</body>
</html>
