<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Controle de Caixa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="text-center mb-4">
                <i class="bi bi-cash-stack text-primary" style="font-size: 3rem;"></i>
                <h2 class="mt-2 fw-bold">Controle de Caixa</h2>
                <p class="text-muted">Faça login para acessar o sistema</p>
            </div>

            <div id="alert-container"></div>

            <form id="form-login">
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control form-control-lg" id="email" placeholder="seu@email.com" required>
                </div>
                <div class="mb-4">
                    <label for="senha" class="form-label">Senha</label>
                    <input type="password" class="form-control form-control-lg" id="senha" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100" id="btn-login">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
                </button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) { window.location.href = 'dashboard.html'; return; }

            document.getElementById('form-login').addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = document.getElementById('btn-login');
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Entrando...';

                try {
                    await fazerLogin(
                        document.getElementById('email').value,
                        document.getElementById('senha').value
                    );
                    window.location.href = 'dashboard.html';
                } catch (err) {
                    mostrarAlerta('Email ou senha inválidos.', 'danger');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Entrar';
                }
            });
        });
    </script>
</body>
</html>
